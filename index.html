        <p>Association de jeux de société à <strong>Coutances, Gouville-sur-Mer et Agon-Coutainville</strong> (Manche, Normandie).</p>
        <p>ALADJ est l'association des passionnés de jeux de société du Coutançais. Fondée le 13 octobre 2010, elle propose une <strong>ludothèque partagée</strong> entre les membres, des <strong>moments jeux conviviaux</strong> et une adhésion ouverte aux personnes de 16 ans et plus.</p>
